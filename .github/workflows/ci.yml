name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: test
    runs-on: self-hosted

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependancies
        run: npm ci
      - name: Run tests
        run: npm test


  build-and-push:
    name: Build & push Docker image
    runs-on: self-hosted
    needs: test               #build ne lance que si test reussi

    steps:
     - name: Checkout code
       uses: actions/checkout@v4
        #Connexion a Docker Hub avec les secrets
     - name: Login to Docker Hub
       uses: docker/build-push-actions@v5
       with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{secrets.DOCKERHUB_TOKEN }}

        #Build and push en une seule etape

     - name: Build and push image
       uses: docker/build-push-action@v5
       with:
          context: .
          push: true
          tags: |
             ${{ secrets.DOCKERHUB_USERNAME }}/secure-dem:latest
             ${{ secrets.DOCKERHUB_TOKEN }}/secure-dem:${{ github.sha }}

        #Smoke test avec l'image qu'on vient de push

     - name: Smoke test
       run: |
          docker run --rm --name smoke-test -p 3001:3002 -d ${{ secrets.DOCKERHUB_USERNAME }}/secure-demo:${{ github.sha }}
          sleep 3
          curl -f http://localhost:3001/ || exit 1
          echo "Smoke test passed"
