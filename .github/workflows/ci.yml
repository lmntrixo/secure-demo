name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: test
    runs-on: self-hosted

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependancies
        run: npm ci
      - name: Run tests
        run: npm test


build:
  name: Build Docker image
  runs-on: self-hosted
  needs: test               #build ne lance que si test reussi

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Build image
     run: |
           docker build -t secure-demo:${{ github.sha }} .
           echo "Image built: secure-demo:${{github.sha }}"
   - name: Smoke test
     run: |
            docker run --rm --name smoke-test -p 3001:3002 -d secure-demo:{{github.sha }}
            sleep 3
            curl -f http://localhost:3001/ || exit 1
            echo "smoke test passed"
